<!doctype html>
<html data-theme="dark">

<head>
  <meta charset="utf-8" />
  <title>YouTube Downloader</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&icon_names=arrow_forward,close&display=block"
    rel="stylesheet" />
  <script type="importmap">
      {
        "imports": {
          "@material/web/": "https://esm.run/@material/web/"
        }
      }
    </script>
  <script type="module">
    import "@material/web/all.js";
    import { styles as typescaleStyles } from "@material/web/typography/md-typescale-styles.js";

    document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
  </script>

  <style>
    :root {
      --md-sys-color-primary: rgb(163 211 152);
      --md-sys-color-surface-tint: rgb(163 211 152);
      --md-sys-color-on-primary: rgb(13 56 13);
      --md-sys-color-primary-container: rgb(38 80 34);
      --md-sys-color-on-primary-container: rgb(190 240 178);
      --md-sys-color-secondary: rgb(186 204 179);
      --md-sys-color-on-secondary: rgb(38 52 34);
      --md-sys-color-secondary-container: rgb(60 75 56);
      --md-sys-color-on-secondary-container: rgb(214 232 206);
      --md-sys-color-tertiary: rgb(160 207 211);
      --md-sys-color-on-tertiary: rgb(0 54 58);
      --md-sys-color-tertiary-container: rgb(30 77 81);
      --md-sys-color-on-tertiary-container: rgb(188 235 239);
      --md-sys-color-error: rgb(255 180 171);
      --md-sys-color-on-error: rgb(105 0 5);
      --md-sys-color-error-container: rgb(147 0 10);
      --md-sys-color-on-error-container: rgb(255 218 214);
      --md-sys-color-background: rgb(16 20 15);
      --md-sys-color-on-background: rgb(224 228 218);
      --md-sys-color-surface: rgb(16 20 15);
      --md-sys-color-on-surface: rgb(224 228 218);
      --md-sys-color-surface-variant: rgb(66 73 63);
      --md-sys-color-on-surface-variant: rgb(194 200 188);
      --md-sys-color-outline: rgb(140 147 136);
      --md-sys-color-outline-variant: rgb(66 73 63);
      --md-sys-color-shadow: rgb(0 0 0);
      --md-sys-color-scrim: rgb(0 0 0);
      --md-sys-color-inverse-surface: rgb(224 228 218);
      --md-sys-color-inverse-on-surface: rgb(45 50 43);
      --md-sys-color-inverse-primary: rgb(61 104 56);
      --md-sys-color-primary-fixed: rgb(190 240 178);
      --md-sys-color-on-primary-fixed: rgb(0 34 2);
      --md-sys-color-primary-fixed-dim: rgb(163 211 152);
      --md-sys-color-on-primary-fixed-variant: rgb(38 80 34);
      --md-sys-color-secondary-fixed: rgb(214 232 206);
      --md-sys-color-on-secondary-fixed: rgb(17 31 15);
      --md-sys-color-secondary-fixed-dim: rgb(186 204 179);
      --md-sys-color-on-secondary-fixed-variant: rgb(60 75 56);
      --md-sys-color-tertiary-fixed: rgb(188 235 239);
      --md-sys-color-on-tertiary-fixed: rgb(0 32 34);
      --md-sys-color-tertiary-fixed-dim: rgb(160 207 211);
      --md-sys-color-on-tertiary-fixed-variant: rgb(30 77 81);
      --md-sys-color-surface-dim: rgb(16 20 15);
      --md-sys-color-surface-bright: rgb(54 58 52);
      --md-sys-color-surface-container-lowest: rgb(11 15 10);
      --md-sys-color-surface-container-low: rgb(25 29 23);
      --md-sys-color-surface-container: rgb(29 33 27);
      --md-sys-color-surface-container-high: rgb(39 43 37);
      --md-sys-color-surface-container-highest: rgb(50 54 48);
    }

    * {
      box-sizing: border-box;
    }

    body {
      background-color: var(--md-sys-color-background);
      margin: 0;
      padding: 16px;
      font-family: Roboto;
      color: var(--md-sys-color-on-background);
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    label {
      display: block;
    }

    label.title {
      font-weight: 700;
      text-align: center;
    }

    md-outlined-text-field {
      width: 100%;
      padding: 16px 0 0 0;
    }

    .checkbox-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    .checkbox-row label {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    md-divider {
      margin: 16px 0 16px 0;
    }

    .buttons {
      display: flex;
      flex-direction: row;
      gap: 16px;
    }
  </style>
</head>

<body>
  <div>
    <label class="title">RMX Toolbox</label>
    <md-outlined-text-field label="YouTube URL" type="url" id="urlInput"></md-outlined-text-field>
  </div>

  <md-divider></md-divider>

  <div class="buttons">
    <md-filled-tonal-icon-button class="cancelButton">
      <md-icon>close</md-icon>
    </md-filled-tonal-icon-button>
    <md-filled-icon-button class="startButton" id="startButton">
      <md-icon>arrow_forward</md-icon>
    </md-filled-icon-button>
  </div>

  <script>
    const urlInput = document.getElementById("urlInput")
    const startButton = document.getElementById("startButton");
    const cancelButton = document.getElementById("cancelButton");

    function isYouTubeUrl(input) {
      let url;
      try {
        url = new URL(input.startsWith("http") ? input : `https://${input}`);
      } catch {
        return false;
      }

      const host = url.hostname.replace("www.", "");

      if (host === "youtu.be") {
        return url.pathname.length > 1;
      }
      if (host === "youtube.com") {
        if (url.pathname.startsWith("/watch")) return url.searchParams.has("v");
      }

      return false;
    }

    const webKit = window.webkit?.messageHandlers?.live; // macOS
    const webView = window.chrome?.webview;              // Windows (WebView2)

    function send(message) {
      if (webKit) webKit.postMessage(message);
      else if (webView) webView.postMessage(message);
    }
    function closeWithResult(result) {
      send({ method: "close_and_send", params: [JSON.stringify(result)] });
    }
    function start() {
      const valid = isYouTubeUrl(urlInput.value.trim());

      if (!valid) {
        urlInput.error = !valid && urlInput.value.length > 0;
        urlInput.errorText = "Invalid YouTube URL!";
        return;
      }

      closeWithResult({ url: urlInput.value.trim(), cancelled: false });
    }
    function cancel() {
      closeWithResult({ url: null, cancelled: true });
    }

    startButton.addEventListener("click", start);
    cancelButton.addEventListener("click", cancel);
  </script>
</body>

</html>
